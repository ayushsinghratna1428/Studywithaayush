<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Hub</title>

<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#0f172a;
  color:white;
}

/* HEADER */
header{
  padding:25px;
  text-align:center;
  font-size:24px;
  font-weight:bold;
  background:linear-gradient(90deg,#6366f1,#a855f7);
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:15px;
  padding:20px;
}

/* GLASS CARD */
.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:16px;
  overflow:hidden;
  transition:0.3s;
}
<body>

  <header>
    <h1>Study Website</h1>
  </header>

  <!-- 👇 YAHAN PASTE KARO -->
  <div class="launcher-container">

    <div class="card" onclick="window.open('https://pw.live', '_blank')">
      <img src="assets/images/pw.png" alt="PW">
      <h3>Physics Wallah</h3>
    </div>

    <div class="card" onclick="window.open('https://www.nexttoppers.com', '_blank')">
      <img src="assets/images/nexttopper.png" alt="Next Topper">
      <h3>Next Topper</h3>
    </div>

    <div class="card" onclick="window.open('https://www.vibrantacademy.com', '_blank')">
      <img src="assets/images/vibrant.png" alt="Vibrant">
      <h3>Vibrant Academy</h3>
    </div>

    <div class="card" onclick="window.open('https://missionjeet.com', '_blank')">
      <img src="assets/images/missionjeet.png" alt="Mission Jeet">
      <h3>Mission Jeet</h3>
    </div>

  </div>

</body>
.card:hover{
  transform:translateY(-6px);
  background:rgba(255,255,255,0.12);
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
}

.card h3{
  text-align:center;
  margin:10px 0;
}

.btn{
  display:block;
  text-align:center;
  margin:10px;
  padding:8px;
  background:linear-gradient(90deg,#6366f1,#a855f7);
  color:white;
  text-decoration:none;
  border-radius:10px;
  font-weight:bold;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  color:#94a3b8;
  font-size:12px;
}

</style>
</head>

<body>

<header>📚 Study Hub 2026 - Modern Learning Platform</header>

<div class="container">

  <div class="card">
    <img src="images/pw.jpg">
    <h3>🔥 Physics Wallah</h3>
    <a class="btn" href="pw.html">Explore</a>
  </div>

  <div class="card">
    <img src="images/nexttopper.jpg">
    <h3>🚀 NextTopper</h3>
    <a class="btn" href="nexttopper.html">Explore</a>
  </div>

  <div class="card">
    <img src="images/vibrant.jpg">
    <h3>🏆 Vibrant Academy</h3>
    <a class="btn" href="vibrant.html">Explore</a>
  </div>

  <div class="card">
    <img src="images/mission.jpg">
    <h3>🎯 Mission Jeet</h3>
    <a class="btn" href="mission.html">Explore</a>
  </div>

</div>

<footer>Made for Students ❤️ | Study Hub</footer>

</body>
</html>
