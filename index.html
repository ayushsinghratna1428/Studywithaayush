<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Study With Aayush</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  overflow:hidden;
  background:linear-gradient(135deg,#ff4fd8,#ff8ce6,#ffd6f5);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

/* WINTER EFFECT */

.snow{
  position:absolute;
  width:6px;
  height:6px;
  background:white;
  border-radius:50%;
  top:-10px;
  opacity:0.8;
  animation:fall linear infinite;
}

@keyframes fall{
  0%{
    transform:translateY(-10px);
    opacity:0;
  }
  100%{
    transform:translateY(110vh);
    opacity:1;
  }
}

/* FLOWERS */

.flower{
  position:absolute;
  top:-50px;
  font-size:24px;
  animation:flowerFall linear infinite;
  opacity:0.9;
}

@keyframes flowerFall{
  0%{
    transform:translateY(-50px) rotate(0deg);
  }
  100%{
    transform:translateY(110vh) rotate(360deg);
  }
}

/* MAIN CARD */

.container{
  width:90%;
  max-width:900px;
  padding:40px;
  border-radius:30px;

  background:rgba(255,255,255,0.12);

  backdrop-filter:blur(20px);

  border:1px solid rgba(255,255,255,0.3);

  box-shadow:
  0 0 40px rgba(255,0,200,0.4),
  0 0 80px rgba(255,255,255,0.2);

  text-align:center;

  animation:glow 3s infinite alternate;

  z-index:2;
}

@keyframes glow{
  from{
    box-shadow:0 0 30px #ff4fd8;
  }
  to{
    box-shadow:0 0 70px #ffffff;
  }
}

.logo{
  font-size:55px;
  margin-bottom:10px;
}

h1{
  color:white;
  font-size:55px;
  font-weight:700;
  text-shadow:0 0 20px white;
}

p{
  margin-top:15px;
  color:white;
  font-size:18px;
}

/* BUTTONS */

.buttons{
  margin-top:40px;
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
}

.btn{
  padding:15px 35px;
  border:none;
  border-radius:50px;
  font-size:18px;
  font-weight:600;
  cursor:pointer;

  transition:0.4s;

  background:white;
  color:#ff1493;

  box-shadow:0 0 20px rgba(255,255,255,0.5);
}

.btn:hover{
  transform:scale(1.12);
  background:#ff1493;
  color:white;
  box-shadow:0 0 30px #ff1493;
}

/* AURA EFFECT */

.aura{
  position:absolute;
  width:700px;
  height:700px;
  background:radial-gradient(circle,
  rgba(255,255,255,0.4),
  rgba(255,0,200,0.1),
  transparent);

  border-radius:50%;
  filter:blur(40px);

  animation:pulse 5s infinite;
}

@keyframes pulse{
  0%{
    transform:scale(1);
  }
  50%{
    transform:scale(1.1);
  }
  100%{
    transform:scale(1);
  }
}

</style>
</head>
<body>

<div class="aura"></div>

<!-- SNOW -->
<script>
for(let i=0;i<100;i++){

  let snow=document.createElement('div');
  snow.classList.add('snow');

  snow.style.left=Math.random()*100+"vw";
  snow.style.animationDuration=(Math.random()*5+5)+"s";
  snow.style.opacity=Math.random();

  document.body.appendChild(snow);
}
</script>

<!-- FLOWERS -->
<script>

let flowers=["🌸","🌺","💮","🌷"];

for(let i=0;i<40;i++){

  let flower=document.createElement('div');

  flower.classList.add('flower');

  flower.innerHTML=flowers[Math.floor(Math.random()*flowers.length)];

  flower.style.left=Math.random()*100+"vw";

  flower.style.animationDuration=(Math.random()*8+6)+"s";

  flower.style.fontSize=(Math.random()*20+20)+"px";

  document.body.appendChild(flower);
}

</script>

<!-- MAIN UI -->

<div class="container">

<div class="logo">🥶🌸</div>

<h1>STUDY WITH AAYUSH</h1>

<p>
Pink Winter Aura UI ✨ <br>
The Ultimate Study Experience
</p>

<div class="buttons">

<button class="btn">NEET Batches</button>

<button class="btn">JEE Batches</button>

<button class="btn">Notes</button>

<button class="btn">PYQ</button>

</div>

</div>

</body>
</html>
